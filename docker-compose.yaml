version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: louisepizdon-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: louisepizdon-bot
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - TZ=Europe/Moscow
      - APPLICATION_CONFIG=${APPLICATION_CONFIG}
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    env_file:
      - .env

volumes:
  redis-data: