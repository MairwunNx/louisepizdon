version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: louisepizdon-redis-dev
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data-dev:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3

  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: louisepizdon-bot-dev
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - TZ=Europe/Moscow
      - APPLICATION_CONFIG=${APPLICATION_CONFIG}
      - DOTNET_ENVIRONMENT=Development
    volumes:
      - ./Louisepizdon:/app/Louisepizdon:ro
      - ./data:/app/data
      - ./logs:/app/logs
    env_file:
      - .env
    command: ["dotnet", "watch", "run", "--project", "/app/Louisepizdon/Louisepizdon.csproj"]

volumes:
  redis-data-dev: